<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>st-momo 本地预览</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: #111;
      color: #fff;
      font-family: "Microsoft YaHei", sans-serif;
    }
    .hint {
      position: fixed;
      left: 16px;
      top: 16px;
      z-index: 1;
      opacity: .75;
      font-size: 13px;
      line-height: 1.5;
      max-width: 280px;
    }
  </style>
</head>
<body>
  <div class="hint">
    右下角粉色圆形按钮「陌」：点击打开/关闭，按住拖动。<br />
    正式使用请把仓库装进 SillyTavern 第三方扩展目录。
  </div>
  <script type="module">
    import { MomoApp } from './src/app.js';

    const fab = document.createElement('button');
    fab.id = 'st-momo-fab';
    fab.type = 'button';
    fab.className = 'mm-fab';
    fab.innerHTML = '<span class="mm-fab-label">陌</span>';
    document.body.appendChild(fab);

    const app = new MomoApp();
    app.mount(fab);
    window.StMomo = app;
  </script>
</body>
</html>
